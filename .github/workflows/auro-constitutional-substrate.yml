name: AURO Constitutional Substrate Gate

on:
  pull_request:
    paths:
      - 'auro_native_llm/substrate/**'
      - 'auro_native_llm/model/checkpoint.py'
      - 'auro_native_llm/organism/checkpoint.py'
      - 'tests/test_checkpoint_constitution.py'
      - '.github/workflows/auro-constitutional-substrate.yml'
  push:
    branches: [main]
    paths:
      - 'auro_native_llm/substrate/**'
      - 'auro_native_llm/model/checkpoint.py'
      - 'auro_native_llm/organism/checkpoint.py'
      - 'tests/test_checkpoint_constitution.py'
      - '.github/workflows/auro-constitutional-substrate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  constitutional-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip numpy pytest
      - name: Compile substrate and checkpoint bindings
        run: |
          python -m py_compile auro_native_llm/substrate/checkpoint_constitution.py
          python -m py_compile auro_native_llm/substrate/promotion_evidence.py
          python -m py_compile auro_native_llm/model/checkpoint.py
          python -m py_compile auro_native_llm/organism/checkpoint.py
      - name: Run authorization and checkpoint tests
        run: PYTHONPATH=. pytest -q tests/test_checkpoint_constitution.py
      - name: Verify constitutional boundaries
        run: |
          grep -q 'authorization_hmac_sha256' auro_native_llm/substrate/checkpoint_constitution.py
          grep -q 'hmac.compare_digest' auro_native_llm/substrate/checkpoint_constitution.py
          grep -q 'AURO_PROMOTION_EVIDENCE' auro_native_llm/model/checkpoint.py
          grep -q 'allow_quarantined: bool = False' auro_native_llm/model/checkpoint.py
          grep -q 'allow_quarantined: bool = False' auro_native_llm/organism/checkpoint.py
          grep -q 'metadata_role' auro_native_llm/organism/checkpoint.py
