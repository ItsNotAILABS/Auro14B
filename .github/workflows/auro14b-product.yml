name: Auro14B Product

on:
  pull_request:
    paths:
      - 'auro14b-app/**'
      - 'docs/production/AURO14B_PRODUCT_MASTER_PLAN.md'
      - '.github/workflows/auro14b-product.yml'
  push:
    branches: [main]
    paths:
      - 'auro14b-app/**'
      - 'docs/production/AURO14B_PRODUCT_MASTER_PLAN.md'
      - '.github/workflows/auro14b-product.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: auro14b-product-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: auro14b-app
        run: npm install --no-audit --no-fund
      - name: Build and validate
        working-directory: auro14b-app
        run: npm run check
      - name: Verify native release surface
        run: |
          test -f auro14b-app/dist/site/index.html
          test -f auro14b-app/dist/site/model-card.html
          test -f auro14b-app/dist/site/release-manifest.json
          test -f auro14b-app/dist/worker/index.js
          grep -q 'NATIVE MULTIMODAL INTELLIGENCE PLATFORM' auro14b-app/dist/site/index.html
          grep -q 'AURO_NATIVE_BASE_URL' auro14b-app/wrangler.jsonc
          grep -q 'new_sqlite_classes' auro14b-app/wrangler.jsonc
          grep -q 'GovernedOperationWorkflow' auro14b-app/wrangler.jsonc
          ! grep -q '"ai"' auro14b-app/wrangler.jsonc
          ! grep -q 'Workers AI' auro14b-app/src/index.ts
      - uses: actions/upload-artifact@v4
        with:
          name: auro14b-product-build
          path: |
            auro14b-app/dist/site
            auro14b-app/dist/worker

  pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: auro14b-app
        run: npm install --no-audit --no-fund && npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: auro14b-app/dist/site
      - id: deployment
        uses: actions/deploy-pages@v4

  worker:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Require Cloudflare credentials
        run: test -n "$CLOUDFLARE_ACCOUNT_ID" && test -n "$CLOUDFLARE_API_TOKEN"
      - working-directory: auro14b-app
        run: npm install --no-audit --no-fund && npm run deploy
