name: Deploy Dual Cloudflare App

on:
  pull_request:
    paths:
      - 'cloudflare-platform/**'
      - 'him-web3/client/**'
      - 'auro_foundry/web/**'
      - 'scripts/build_dual_app.sh'
      - '.github/workflows/deploy-dual-cloudflare-app.yml'
  push:
    branches: [main]
    paths:
      - 'cloudflare-platform/**'
      - 'him-web3/client/**'
      - 'auro_foundry/web/**'
      - 'scripts/build_dual_app.sh'
      - '.github/workflows/deploy-dual-cloudflare-app.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            cloudflare-platform/package-lock.json
            him-web3/client/package-lock.json
      - name: Install Worker dependencies
        run: npm ci
        working-directory: cloudflare-platform
      - name: Build both applications and validate Worker
        run: npm run check
        working-directory: cloudflare-platform
      - name: Verify application surfaces
        run: |
          test -f cloudflare-platform/public/index.html
          test -f cloudflare-platform/public/web3/index.html
          test -f cloudflare-platform/public/foundry/index.html
          test -f cloudflare-platform/dist/worker/index.js
          grep -q '/web3/' cloudflare-platform/public/index.html
          grep -q '/foundry/' cloudflare-platform/public/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: dual-cloudflare-app
          path: |
            cloudflare-platform/public
            cloudflare-platform/dist/worker

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
        working-directory: cloudflare-platform
      - name: Require deployment credentials
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
      - name: Deploy Worker and both apps
        run: npm run deploy
        working-directory: cloudflare-platform
