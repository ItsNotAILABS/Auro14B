name: NEXUS Relay Gate
on:
  pull_request:
    paths:
      - 'products/nexus-relay/**'
      - '.github/workflows/nexus-relay.yml'
  push:
    branches: [main]
    paths:
      - 'products/nexus-relay/**'
      - '.github/workflows/nexus-relay.yml'
  workflow_dispatch:
jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/nexus-relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run bounded integration tests
        run: timeout 120s npm test
      - run: npm run check
      - name: Verify hardened hosted boundaries
        run: |
          grep -q 'JOIN customers' src/auth.js
          grep -q "INSERT INTO usage_events" src/auth.js
          grep -q "status = 'completed'" src/auth.js
          grep -q 'redirect: "manual"' src/security.js
          grep -q '169.254.0.0' src/security.js
          grep -q 'cloudflare-dns.com' src/security.js
          grep -q 'ALLOWED_ORIGINS' src/index.js
          grep -q 'metering only' src/index.js
          grep -q 'Residual DNS rebinding limitation' SECURITY_LIMITATIONS.md
          grep -q 'NEXUS_RELAY_API_KEY' src/skill.js
