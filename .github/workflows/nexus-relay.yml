name: NEXUS Relay Gate
on:
  pull_request:
    paths:
      - 'products/nexus-relay/**'
      - '.github/workflows/nexus-relay.yml'
  push:
    branches: [main]
    paths:
      - 'products/nexus-relay/**'
      - '.github/workflows/nexus-relay.yml'
jobs:
  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/nexus-relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - run: npm run check
      - name: Verify hosted product boundaries
        run: |
          grep -q 'hosted public-web context API' README.md
          grep -q 'Customer keys are stored as SHA-256 hashes' README.md
          grep -q 'No login bypass' README.md
          grep -q 'private and loopback network targets are blocked' src/index.js
          grep -q 'Authorization: Bearer' README.md
          grep -q 'usage_events' schema.sql
          grep -q 'NEXUS_RELAY_API_KEY' src/skill.js
          grep -q 'content_sha256' src/index.js
          grep -q 'tools/list' src/mcp.js
