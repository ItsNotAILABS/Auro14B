<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auro Mind — Monaco · Jupyter · Search · MCP</title>
  <style>
    :root {
      --bg: #0b1020; --panel: #141b2d; --text: #e8eefc; --muted: #8b9bb8;
      --accent: #5b8cff; --ok: #3dd68c; --border: #243049;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    header h1 { margin: 0; font-size: 1.05rem; }
    .badge { font-size: 0.75rem; color: var(--muted); border: 1px solid var(--border); padding: 0.2rem 0.55rem; border-radius: 999px; }
    main { display: grid; grid-template-columns: 280px 1fr 1fr; gap: 0.75rem; padding: 0.75rem; min-height: calc(100vh - 60px); }
    .row2 { grid-column: 1 / -1; min-height: 360px; }
    @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem; display: flex; flex-direction: column; min-height: 280px; }
    h2 { margin: 0 0 0.6rem; font-size: 0.85rem; color: var(--muted); }
    textarea, input, select { width: 100%; background: #0d1424; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; margin-bottom: 0.5rem; font: inherit; }
    textarea { min-height: 70px; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 0.5rem 0.75rem; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 0.4rem; }
    button.secondary { background: #243049; }
    #editor { flex: 1; min-height: 320px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    pre { flex: 1; overflow: auto; font-size: 0.78rem; background: #0d1424; border-radius: 8px; padding: 0.65rem; border: 1px solid var(--border); white-space: pre-wrap; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
</head>
<body>
  <header>
    <h1>AURO MIND · Monaco · Jupyter · Pythonista host</h1>
    <span class="badge" id="health">…</span>
  </header>
  <main>
    <section class="card">
      <h2>Mind controls</h2>
      <button id="btn-teach">Teach tools (curriculum)</button>
      <button class="secondary" id="btn-mcp">Spin MCP + list tools</button>
      <button class="secondary" id="btn-search">Search MESIE</button>
      <button class="secondary" id="btn-jupyter">Jupyter create+run</button>
      <button class="secondary" id="btn-work">Work: browse example.com</button>
      <label style="font-size:0.75rem;color:var(--muted)">Objective / query</label>
      <textarea id="q">browse https://example.com and open Monaco with a helper function</textarea>
      <button id="btn-run">Run mind work</button>
    </section>
    <section class="card">
      <h2>Monaco (embedded)</h2>
      <div id="editor"></div>
      <button class="secondary" id="btn-save-monaco" style="margin-top:0.5rem">Push editor → mind session</button>
    </section>
    <section class="card">
      <h2>Result / JSON</h2>
      <pre id="out">Ready. Organs: Monaco, Jupyter, Search, MCP, Chrome, doctrine, self-train, Pythonista.</pre>
    </section>
    <section class="card row2">
      <h2>Pythonista host — Python scripts (background) · JS renders UI + DB tables</h2>
      <div id="pythonista-root" style="flex:1;min-height:300px"></div>
    </section>
  </main>
  <script src="/v1/pythonista/host.js"></script>
  <script>
    let editor, sessionId = null;
    const out = document.getElementById('out');

    async function api(path, body) {
      const r = await fetch(path, {
        method: body ? 'POST' : 'GET',
        headers: body ? {'Content-Type':'application/json'} : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      return r.json();
    }

    function show(data) { out.textContent = JSON.stringify(data, null, 2); }

    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: '# Auro embedded Monaco\\ndef spectral_score(x):\\n    return sum(x) / max(len(x), 1)\\n',
        language: 'python',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false },
      });
    });

    async function mind(action, extra={}) {
      return api('/v1/mind', { action, ...extra });
    }

    document.getElementById('btn-teach').onclick = async () => show(await mind('teach'));
    document.getElementById('btn-mcp').onclick = async () => {
      const spin = await mind('mcp', { op: 'spin_up' });
      const tools = await mind('mcp', { op: 'list_tools' });
      show({ spin, tools });
    };
    document.getElementById('btn-search').onclick = async () => {
      show(await mind('search', { query: document.getElementById('q').value || 'MESIE', online: false }));
    };
    document.getElementById('btn-jupyter').onclick = async () => {
      const created = await mind('jupyter', { op: 'create', args: { title: 'UI Lab' } });
      const nid = created.output?.notebook?.notebook_id;
      const add = await mind('jupyter', { op: 'add_cell', args: { notebook_id: nid, source: 'print(40+2)', cell_type: 'code' } });
      const cid = add.output?.cell_id;
      const run = await mind('jupyter', { op: 'execute', args: { notebook_id: nid, cell_id: cid } });
      show({ created, add, run });
    };
    document.getElementById('btn-work').onclick = async () => {
      show(await mind('work', { objective: 'browse https://example.com and read DOM' }));
    };
    document.getElementById('btn-run').onclick = async () => {
      show(await mind('work', { objective: document.getElementById('q').value }));
    };
    document.getElementById('btn-save-monaco').onclick = async () => {
      const content = editor ? editor.getValue() : '';
      if (!sessionId) {
        const created = await mind('monaco', { op: 'create', args: { content, language: 'python', filename: 'ui.py' } });
        sessionId = created.output?.session?.session_id;
        show(created);
      } else {
        show(await mind('monaco', { op: 'set', args: { session_id: sessionId, content } }));
      }
    };

    (async () => {
      try {
        const h = await api('/health');
        document.getElementById('health').textContent = h.ok ? 'MESIE · API up · mind organs ready' : 'down';
        const info = await mind('info');
        // preload monaco session
        const m = await mind('monaco', { op: 'create', args: { content: editor ? editor.getValue() : 'x=1\\n', language: 'python' } });
        sessionId = m.output?.session?.session_id;
        if (window.AuroPythonista) {
          await window.AuroPythonista.mount('#pythonista-root', { autorun: 'hello_dashboard.py' });
        }
      } catch (e) {
        document.getElementById('health').textContent = 'offline';
      }
    })();
  </script>
</body>
</html>
