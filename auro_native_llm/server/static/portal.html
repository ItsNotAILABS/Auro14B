<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auro Interior MCP Portal — Multi-site Agents</title>
  <style>
    :root {
      --bg: #070b14; --panel: #121a2c; --text: #e8eefc; --muted: #8b9bb8;
      --accent: #6c5ce7; --ok: #3dd68c; --border: #243049; --warn: #f0c14a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .5rem; }
    header h1 { margin: 0; font-size: 1.05rem; letter-spacing: .02em; }
    .badge { font-size: .75rem; color: var(--muted); border: 1px solid var(--border); padding: .2rem .55rem; border-radius: 999px; }
    .badge.ok { color: var(--ok); border-color: #2a5a40; }
    main { display: grid; grid-template-columns: 280px 1fr 1fr; gap: .75rem; padding: .75rem; min-height: calc(100vh - 64px); }
    @media (max-width: 1100px) { main { grid-template-columns: 1fr; } }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: .9rem; display: flex; flex-direction: column; min-height: 240px; }
    h2 { margin: 0 0 .55rem; font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    textarea, input, select { width: 100%; background: #0d1424; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: .5rem; margin-bottom: .45rem; font: inherit; }
    textarea { min-height: 72px; resize: vertical; }
    button { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: .5rem .75rem; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: .35rem; }
    button.secondary { background: #243049; }
    button.ok { background: #1f6b45; }
    pre { flex: 1; overflow: auto; font-size: .72rem; background: #0d1424; border-radius: 8px; padding: .65rem; border: 1px solid var(--border); white-space: pre-wrap; margin: 0; }
    .row { display: flex; gap: .35rem; }
    .row button { flex: 1; }
    .tool { font-size: .72rem; padding: .3rem .45rem; border: 1px solid var(--border); border-radius: 6px; margin: .2rem 0; color: var(--muted); cursor: pointer; }
    .tool:hover { border-color: var(--accent); color: var(--text); }
    a { color: #a29bfe; }
  </style>
</head>
<body>
  <header>
    <h1>AURO INTERIOR MCP PORTAL · multi-site agents · internet UI control</h1>
    <div>
      <span class="badge" id="health">…</span>
      <span class="badge" id="mcp-url">mcp offline</span>
      <a class="badge" href="/">mind UI</a>
    </div>
  </header>
  <main>
    <section class="card">
      <h2>Portal control</h2>
      <button id="btn-spin" class="ok">Spin interior MCP</button>
      <button class="secondary" id="btn-tools">Refresh tools</button>
      <button class="secondary" id="btn-manifest">Portal manifest</button>
      <button class="secondary" id="btn-polyglot">Polyglot suite</button>
      <button class="secondary" id="btn-teach">Teach domains (brains)</button>
      <h2 style="margin-top:.8rem">Tools</h2>
      <div id="tools" style="overflow:auto;flex:1"></div>
    </section>
    <section class="card">
      <h2>Multi-site fleet (parallel internet)</h2>
      <label style="font-size:.72rem;color:var(--muted)">URLs (one per line)</label>
      <textarea id="urls">https://example.com
https://example.org
https://www.wikipedia.org</textarea>
      <label style="font-size:.72rem;color:var(--muted)">Objective</label>
      <input id="objective" value="Survey titles and main text across sites in parallel" />
      <div class="row">
        <button id="btn-open">Open many</button>
        <button class="secondary" id="btn-read">Read all</button>
      </div>
      <button id="btn-work">Work multi-site objective</button>
      <button class="secondary" id="btn-click-all">Act: eval title on all</button>
      <h2 style="margin-top:.6rem">Sites</h2>
      <pre id="sites">No sites yet.</pre>
    </section>
    <section class="card">
      <h2>Result JSON</h2>
      <pre id="out">Alpha portal ready. Spin MCP, open sites, run parallel agents.</pre>
    </section>
  </main>
  <script>
    const out = document.getElementById('out');
    const toolsEl = document.getElementById('tools');
    const sitesEl = document.getElementById('sites');

    async function api(path, body) {
      const r = await fetch(path, {
        method: body ? 'POST' : 'GET',
        headers: body ? {'Content-Type':'application/json'} : undefined,
        body: body ? JSON.stringify(body) : undefined,
      });
      return r.json();
    }
    function show(data) { out.textContent = JSON.stringify(data, null, 2); }
    function urls() {
      return document.getElementById('urls').value.split(/\n+/).map(s => s.trim()).filter(Boolean);
    }

    async function portal(action, extra={}) {
      return api('/v1/portal', { action, ...extra });
    }

    function renderTools(list) {
      toolsEl.innerHTML = '';
      (list || []).forEach(t => {
        const d = document.createElement('div');
        d.className = 'tool';
        d.textContent = t.name + ' — ' + (t.description || '').slice(0, 60);
        d.onclick = async () => {
          if (t.name === 'sites.list') show(await portal('call', { tool: t.name }));
          else show({ tip: 'Use fleet controls or call with args', tool: t.name });
        };
        toolsEl.appendChild(d);
      });
    }

    document.getElementById('btn-spin').onclick = async () => {
      const r = await portal('spin');
      show(r);
      document.getElementById('mcp-url').textContent = r.url || r.portal?.mcp_url || 'mcp';
      document.getElementById('mcp-url').classList.add('ok');
      renderTools(r.tools || r.portal?.tools?.map(n => ({name:n, description:''})) || []);
      if (r.tools) renderTools(r.tools);
      else {
        const lt = await portal('list_tools');
        renderTools(lt.tools);
      }
    };
    document.getElementById('btn-tools').onclick = async () => {
      const lt = await portal('list_tools');
      renderTools(lt.tools);
      show(lt);
    };
    document.getElementById('btn-manifest').onclick = async () => show(await portal('manifest'));
    document.getElementById('btn-polyglot').onclick = async () => show(await portal('call', { tool: 'polyglot.suite', arguments: {} }));
    document.getElementById('btn-teach').onclick = async () => show(await portal('call', { tool: 'brains.teach', arguments: { steps_per_lesson: 1 } }));

    document.getElementById('btn-open').onclick = async () => {
      const r = await portal('call', { tool: 'sites.open_many', arguments: { urls: urls() } });
      show(r);
      sitesEl.textContent = JSON.stringify(r.result?.sites || r.sites || r, null, 2);
    };
    document.getElementById('btn-read').onclick = async () => {
      const r = await portal('call', { tool: 'sites.read_all', arguments: {} });
      show(r);
    };
    document.getElementById('btn-work').onclick = async () => {
      const r = await portal('call', {
        tool: 'sites.work',
        arguments: { objective: document.getElementById('objective').value, urls: urls() },
      });
      show(r);
      sitesEl.textContent = (r.result?.summary_for_llm || r.summary_for_llm || JSON.stringify(r, null, 2));
    };
    document.getElementById('btn-click-all').onclick = async () => {
      show(await portal('call', { tool: 'sites.act_all', arguments: { action: 'eval', js: 'document.title' } }));
    };

    (async () => {
      try {
        const h = await api('/health');
        document.getElementById('health').textContent = h.ok ? 'MESIE · portal API up' : 'down';
        document.getElementById('health').classList.add('ok');
      } catch (e) {
        document.getElementById('health').textContent = 'offline';
      }
    })();
  </script>
</body>
</html>
