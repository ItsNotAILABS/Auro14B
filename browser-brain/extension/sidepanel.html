<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HIM</title><link rel="stylesheet" href="sidepanel.css"></head><body><header><p>AURO14B · EMBEDDED BRAIN</p><h1>HIM</h1><span id="state">sleeping</span></header><nav><button data-tab="chat" class="active">Chat</button><button data-tab="memory">Memory</button><button data-tab="research">Research</button><button data-tab="graph">Graph</button><button data-tab="documents">Documents</button></nav><main><section id="chat" class="tab active"><div id="messages"><p class="muted">Local inference only. The first awakening loads HIM’s local ONNX weights.</p></div><form id="chatForm"><textarea id="prompt" required maxlength="12000" placeholder="Talk to HIM…"></textarea><button>Think</button></form></section><section id="memory" class="tab"><h2>Local memory</h2><form id="memoryForm"><input id="memoryQuery" required placeholder="Recall…"><button>Search</button></form><pre id="memoryOut"></pre></section><section id="research" class="tab"><h2>Inner research</h2><form id="researchForm"><textarea id="objective" required placeholder="Research objective…"></textarea><div><button>Run now</button><button type="button" id="queue">Queue in background</button></div></form><pre id="researchOut"></pre></section><section id="graph" class="tab"><h2>Knowledge graph</h2><button id="loadGraph">Refresh graph</button><pre id="graphOut"></pre></section><section id="documents" class="tab"><h2>Native document</h2><form id="docForm"><input id="docTitle" required placeholder="Title"><textarea id="docBody" required placeholder="Document body…"></textarea><button>Download Markdown</button></form><pre id="docOut"></pre></section></main><script src="sidepanel.bundle.js"></script></body></html>
