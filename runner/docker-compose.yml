services:
  mesie-runner:
    build:
      context: ..
      dockerfile: runner/Dockerfile.cuda
    image: mesie/github-runner:cuda12.4
    restart: unless-stopped
    init: true
    environment:
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-ItsNotAILABS/Auro14B}
      GITHUB_RUNNER_TOKEN: ${GITHUB_RUNNER_TOKEN:?set a short-lived GitHub runner registration token}
      RUNNER_NAME: ${RUNNER_NAME:-mesie-gpu-01}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      RUNNER_LABELS: ${RUNNER_LABELS:-self-hosted,linux,x64,gpu,mesie,spectral-transformer}
      RUNNER_EPHEMERAL: ${RUNNER_EPHEMERAL:-true}
      MESIE_NODE_ID: ${MESIE_NODE_ID:-mesie-gpu-01}
    volumes:
      - mesie-work:/workspace
      - mesie-receipts:/opt/mesie/receipts
      - mesie-cache:/home/runner/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mesie-work:
  mesie-receipts:
  mesie-cache:
